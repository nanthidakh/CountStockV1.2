name: Build APK

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:


      # ==========================
      # Checkout
      # ==========================
      - name: Checkout
        uses: actions/checkout@v4



      # ==========================
      # Install Dependencies
      # ==========================
      - name: Install dependencies
        run: |

          sudo apt update


          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev


          python3 -m pip install --upgrade pip


          pip install \
            buildozer==1.5.0 \
            Cython==0.29.36




      # ==========================
      # Java 17
      # ==========================
      - name: Setup Java
        run: |

          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV



      # ==========================
      # Clean
      # ==========================
      - name: Clean Buildozer
        run: |

          rm -rf ~/.buildozer

          rm -rf .buildozer




      # ==========================
      # Build APK
      # ==========================
      - name: Build APK
        run: |

          buildozer -v android debug




      # ==========================
      # Upload APK
      # ==========================
      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:

          name: CountStock-APK

          path: bin/*.apk